<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- PyScript-->

    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
<!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

 <title> 10 Ruby Class</title>

 <!-- Styling -->

 <style>
         body {
            background-color: #ffffd9; 
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 12%;
        }
        
        .navbar {
            background: linear-gradient(to right, #f5d1ea, #df8c9f, #df8c9f, #f5d1ea);
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-weight: bold;
        }

        .nav-link {
            color: black;
            text-decoration: none;
            font-weight: bold;
            background-color: rgba(255, 255, 217, 0.3);
            border: 1px solid #ffffd9;
            border-radius: 12px;
            padding: 5px 15px;
            margin-left: 10px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background-color: #ffffd9;
            color: #df8c9f;
        }

        .navbar img {
            height: 50px;  
            width: auto;   
            margin-right: 15px; 
            vertical-align: middle; 
        }

        .tracker-card {
            background-color: #f0bcd4; 
            border-radius: 20px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tracker-title {
            color: black; 
            text-align: center;
            font-weight: bold;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .btn-submit {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #ffffd9; 
            cursor: pointer;
            margin: 5px;
        }

        .btn-default:hover {
            background-color: #ffffd9; 
        }

        .accent-bar {
            background-color: #ffffd9; 
            height: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        #graph-container {
            background-color: white;
            display: none; 
            max-width: 510px;
        }

        hr {
            border: 0;
            height: 3px;
            background: #ffffff;  
            width: 100%;      
        }

 </style>
 </head>

 <!-- Navigation Bar -->
<nav class="navbar navbar-expand-md fixed-top">
    <div class="container-fluid"> 
       
        <a class="navbar-brand d-flex align-items-center" href="index.html"><img src="ruby.png">
            <span style="font-family: Poppins; color: black; font-size: large; text-align: left;">10 Ruby Class</span></a> 
       
            <div class="collapse navbar-collapse justify-content-end" id="nav-menu">
            <ul class="navbar-nav">
           
            <li class="nav-item">
            <a class="nav-link" href="index.html" style="font-family: Poppins; color: black; font-size: large;">Add Classmate</a>
            </li>

            <li class="nav-item">
            <a class="nav-link" href="track.html" style="font-family: Poppins; color: black; font-size: large;">Attendance</a>
            </li>

            <li class="nav-item">
            <a class="nav-link" href="highlights.html" style="font-family: Poppins; color: black; font-size: large;">Highlights</a>
            </li>
        </ul>
    </div>

</div>
</nav>

<body>

<!-- Form -->
<div class="container">
    <div class="row justify-content-center align-items-center g-4">
        
        <div class="col-lg-4 col-md-6 col-sm-10">
            <div class="card p-4 tracker-card">
                <h1 class="tracker-title">Attendance Tracker</h1>
                <hr>
                
                <div class="mb-3">
                    <label><b>Select Day</b></label>
                    <select id="section" class="form-select">
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label><b>Absences</b></label>
                    <input type="number" id="math" class="form-control" min="0" placeholder="Enter number">
                </div>

                <!-- Button -->
                <button py-click="update_and_plot" class="btn btn-submit">Submit</button>
                <div class="accent-bar"></div>
            </div>
        </div>

        <!-- Output Bar-->
        <div class="col-md-5 d-flex justify-content-center">
            <div id="graph-container">
                <div id="output"></div>
            </div>
        </div>

    </div>
</div>

<!-- Graph -->
<py-config>
    packages = ['numpy', 'matplotlib']
</py-config>

<!-- Python File -->
 <script type="py" src="track.py"></script>

</body>
</html>
